name: Build Flutter APK

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
    
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.27.0'
        channel: 'stable'
        cache: true
    
    - name: Get dependencies
      working-directory: client/chat_app
      run: flutter pub get
    
    - name: Setup signing
      env:
        KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
      run: |
        if [ -n "$KEYSTORE_BASE64" ]; then
          echo "Setting up release signing..."
          echo "$KEYSTORE_BASE64" | base64 -d > client/chat_app/android/app/chat-app-release.jks
          echo "storePassword=$KEYSTORE_PASSWORD" > client/chat_app/android/key.properties
          echo "keyPassword=$KEY_PASSWORD" >> client/chat_app/android/key.properties
          echo "keyAlias=$KEY_ALIAS" >> client/chat_app/android/key.properties
          echo "storeFile=chat-app-release.jks" >> client/chat_app/android/key.properties
          echo "HAS_KEYSTORE=true" >> $GITHUB_ENV
        else
          echo "No keystore found, using debug signing"
        fi
    
    - name: Build APK
      working-directory: client/chat_app
      run: flutter build apk --release --verbose
      continue-on-error: false
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: chat-app-release
        path: client/chat_app/build/app/outputs/flutter-apk/app-release.apk
        retention-days: 30
    
    - name: Create Release
      if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v1.0.${{ github.run_number }}
        name: Chat App v1.0.${{ github.run_number }}
        body: |
          Chat App Release
          
          构建于: ${{ github.event.head_commit.timestamp }}
          提交: ${{ github.sha }}
          签名: ${{ env.HAS_KEYSTORE == 'true' && 'Release签名' || 'Debug签名' }}
        files: client/chat_app/build/app/outputs/flutter-apk/app-release.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}